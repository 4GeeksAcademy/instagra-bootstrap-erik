<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram BS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="main-container">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                    <i class="fa-brands fa-instagram" style="color: rgb(0, 0, 0);"></i>
                    Instagram
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end me-2" id="navbarNavDropdown">
                    <ul class="navbar-nav d-flex gap-2">
                        <li class="nav-item">
                            <a class="btn btn-success text-white" data-bs-toggle="modal" data-bs-target="#exampleModal">
                                Create a new post
                            </a>
                        </li>

                        <li class="nav-item dropdown">
                            <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                <i class="fa-solid fa-gear"></i>
                            </button>

                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Accesibility</a></li>
                                <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item text-danger" href="#">Log out</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- Navbar END -->

        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Create a new post</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div class="caption-container">
                            <label for="post-caption" class="form-label">Caption:</label>
                            <textarea id="post-caption" class="form-control"
                                placeholder="Add the caption of your post here."></textarea>

                            <div class="caption-icons mt-2 d-flex gap-2">
                                <button class="btn btn-outline-secondary" type="button">
                                    <i class="fa-solid fa-camera" style="color: rgb(0, 0, 0);"></i>
                                </button>
                                <button class="btn btn-outline-secondary" type="button">
                                    <i class="fa-solid fa-location-dot" style="color: rgb(0, 0, 0);"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-success">Publish</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Modal END -->

        <!-- Tabs -->
        <div class="tabs-container">
            <nav class="d-flex justify-content-center">
                <div class="nav nav-tabs" id="nav-tab" role="tablist">
                    <button class="nav-link active" id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#nav-grid"
                        type="button" role="tab" aria-controls="nav-grid" aria-selected="true">
                        <i class="fa-solid fa-table-cells" style="color: rgb(39, 86, 168);"></i>
                    </button>

                    <button class="nav-link" id="nav-profile-tab" data-bs-toggle="tab" data-bs-target="#nav-single"
                        type="button" role="tab" aria-controls="nav-single" aria-selected="false">
                        <i class="fa-solid fa-square" style="color: rgb(39, 86, 168);"></i>
                    </button>
                </div>
            </nav>

            <div class="tab-content" id="nav-tabContent">
                <!-- Grid tab -->
                <div class="tab-pane fade show active" id="nav-grid" role="tabpanel" aria-labelledby="nav-home-tab"
                    tabindex="0">
                    <div class="container mt-3 mb-1">
                        <div class="row justify-content-center">
                            <div class="col-lg-11 col-xl-10">
                                <div class="row g-1">
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/1/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/2/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/3/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/4/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/5/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/6/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/7/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/8/300"
                                            alt="random image">
                                    </div>
                                    <div class="col-4">
                                        <img class="img-fluid w-100" src="https://picsum.photos/seed/9/300"
                                            alt="random image">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Single tab -->
                <div class="tab-pane fade" id="nav-single" role="tabpanel" aria-labelledby="nav-profile-tab"
                    tabindex="0">
                </div>
            </div>
        </div>
        <!-- Tabs END -->
    </div>

    <script src="https://kit.fontawesome.com/d80be40a3f.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
